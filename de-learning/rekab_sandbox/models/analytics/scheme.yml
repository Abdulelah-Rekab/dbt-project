version: 2

models:
  - name: Driver_Performance
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - driver_id
            - performance_date
    columns:
      - name: driver_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_drivers')
                field: driver_id
      - name: performance_date
        tests:
          - not_null