services:
  dbt:
    build: .
    volumes:
      - .:/usr/app/dbt
      - ./profiles:/root/.dbt
    environment:
      - DBT_PROJECT_DIR=/usr/app/dbt
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.dbt/service_account.json
    command: run

  docs:
    build: .
    volumes:
      - .:/usr/app/dbt
      - ./profiles:/root/.dbt
    environment:
      - DBT_PROJECT_DIR=/usr/app/dbt
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.dbt/service_account.json
    ports:
      - "8080:8080"
    entrypoint: >
      sh -c "dbt docs generate && dbt docs serve --host 0.0.0.0 --port 8080"
